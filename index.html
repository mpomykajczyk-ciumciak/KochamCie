body {
  background: #1a0010;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Georgia', serif;
}

/* --- SERDUSZKO --- */
.heart {
  position: relative;
  width: 150px;
  height: 135px;
  animation: bicie 1s ease-in-out infinite;
  filter: drop-shadow(0 0 30px rgba(255, 50, 100, 0.8));
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  width: 75px;
  height: 120px;
  background: #ff2255;
  border-radius: 75px 75px 0 0;
}

.heart::before {
  left: 75px;
  transform-origin: 0 100%;
  transform: rotate(-45deg);
}

.heart::after {
  left: 0;
  transform-origin: 100% 100%;
  transform: rotate(45deg);
}

@keyframes bicie {
  0%   { transform: scale(1); }
  14%  { transform: scale(1.15); }
  28%  { transform: scale(1); }
  42%  { transform: scale(1.1); }
  70%  { transform: scale(1); }
  100% { transform: scale(1); }
}

/* --- NAPIS --- */
.napis {
  margin-top: 50px;
  color: #ff6688;
  font-size: 2rem;
  letter-spacing: 4px;
  text-align: center;
  animation: pojawianie 2s ease forwards, pulsowanie 3s ease-in-out 2s infinite;
  opacity: 0;
  text-shadow: 0 0 20px rgba(255, 100, 136, 0.8);
}

@keyframes pojawianie {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes pulsowanie {
  0%, 100% { text-shadow: 0 0 20px rgba(255, 100, 136, 0.8); }
  50%       { text-shadow: 0 0 40px rgba(255, 100, 136, 1), 0 0 60px rgba(255, 50, 100, 0.5); }
}

/* --- LATAJĄCE SERDUSZKA W TLE --- */
.particles {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: -1;
}

.particle {
  position: absolute;
  bottom: -20px;
  font-size: 1.2rem;
  animation: lecenie linear infinite;
  opacity: 0;
}

@keyframes lecenie {
  0%   { transform: translateY(0) rotate(0deg); opacity: 0.8; }
  100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
}

<body>

  <div class="heart"></div>
  <div class="napis">Kocham Cię<br>Natalio Dzbanoteńska ❤️</div>

  <div class="particles" id="particles"></div>

  <script>
    const container = document.getElementById('particles');
    const emoji = ['❤️','💕','💖','💗','💓','🌹'];

    function tworzenieSerc() {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.textContent = emoji[Math.floor(Math.random() * emoji.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (0.8 + Math.random() * 1.5) + 'rem';
      const czas = 4 + Math.random() * 6;
      p.style.animationDuration = czas + 's';
      p.style.animationDelay = Math.random() * 3 + 's';
      container.appendChild(p);
      setTimeout(() => p.remove(), (czas + 3) * 1000);
    }

    setInterval(tworzenieSerc, 400);
  </script>

</body>
